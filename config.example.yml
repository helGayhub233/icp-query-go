# icpcli 完整配置示例
# 所有字段均可选，复制需要修改的项到 config.yml 即可
# 也可通过环境变量覆盖，如 ICP_PORT=8080、ICP_TIMEOUT=60

port: 8080              # HTTP 服务端口
host: 0.0.0.0           # 监听地址
timeout: 30             # HTTP 请求超时（秒）
retry_times: 10         # 验证码重试次数
concurrency: 5          # 并发详情获取协程数

proxy:
  tunnel: ""            # 隧道代理 URL，如 socks5://127.0.0.1:1080
  pool:
    url: ""             # 代理池 API 地址
    size: 100           # 最大代理数
    ipv6: false         # 启用本地 IPv6 出口
    ipv6_num: 88        # IPv6 池大小
