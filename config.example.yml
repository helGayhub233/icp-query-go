# icpcli 完整配置示例
# 所有字段均可选，复制需要修改的项到 config.yml 即可
# 也可通过环境变量覆盖，如 ICP_RATE_LIMIT_QUERY_PER_MIN=20

timeout: 30             # HTTP 请求超时（秒）
concurrency: 5          # 并发详情获取协程数

# MCP 请求节流（防止过度调用 MIIT 接口）
rate_limit:
  enabled: true          # 是否启用限流
  query_per_min: 5      # icp_query 每分钟最大调用次数
  blacklist_per_min: 3  # icp_blacklist 每分钟最大调用次数

proxy:
  tunnel: ""            # 隧道代理 URL，如 socks5://127.0.0.1:1080
  pool:
    url: ""             # 代理池 API 地址
    size: 100           # 最大代理数
    ipv6: false         # 启用本地 IPv6 出口
