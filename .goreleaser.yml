version: 2

builds:
  - binary: icpcli
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/imxw/icp-query-go/cmd.Version={{.Version}}
      - -X github.com/imxw/icp-query-go/cmd.GitCommit={{.Commit}}
      - -X github.com/imxw/icp-query-go/cmd.BuildDate={{.Date}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}-
      {{- .Version }}-
      {{- .Os }}-
      {{- .Arch }}
    files:
      - config.example.yml
      - README.md
      - LICENSE
      - .claude/skills/icp-query/SKILL.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
